spring.application.name=PollFlow

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/pollflow?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server Configuration
server.port=8082

# JWT Configuration
jwt.secret=PollFlowSecretKey2024VeryLongSecretKeyForJWTTokenGenerationAndValidation
jwt.expiration=86400000

# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# Logging
logging.level.com.pollflow=INFO
logging.level.org.springframework.security=INFO

# Gemini AI Configuration
gemini.api.key=AIzaSyBItiEjw8qFqH3qeNIDBvy7LA9ymToYBzg
