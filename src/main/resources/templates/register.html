<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - PollFlow</title>
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-shapes">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
        </div>
        
        <a href="/" class="auth-logo">
            <i class="bi bi-lightning-charge-fill"></i> PollFlow
        </a>
        
        <div class="auth-card auth-card-wide">
            <div class="auth-header">
                <h1>Create Account</h1>
                <p>Join PollFlow and start participating</p>
            </div>
            
            <form action="/register" method="post" class="auth-form" id="registerForm">
                <div class="form-section-title">Account Information</div>
                
                <div class="form-row">
                    <div class="input-group">
                        <input type="text" id="fullName" name="fullName" placeholder=" " required>
                        <label for="fullName">Full Name</label>
                        <i class="bi bi-person"></i>
                    </div>
                    
                    <div class="input-group">
                        <input type="email" id="email" name="email" placeholder=" " required>
                        <label for="email">Email Address</label>
                        <i class="bi bi-envelope"></i>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="input-group input-group-password">
                        <input type="password" id="password" name="password" placeholder=" " required minlength="6">
                        <label for="password">Password</label>
                        <i class="bi bi-lock"></i>
                        <button type="button" class="password-toggle" onclick="togglePassword('password')">
                            <i class="bi bi-eye" id="passwordIcon"></i>
                        </button>
                    </div>
                    
                    <div class="input-group input-group-password">
                        <input type="password" id="confirmPassword" name="confirmPassword" placeholder=" " required>
                        <label for="confirmPassword">Confirm Password</label>
                        <i class="bi bi-lock-fill"></i>
                        <button type="button" class="password-toggle" onclick="togglePassword('confirmPassword')">
                            <i class="bi bi-eye" id="confirmPasswordIcon"></i>
                        </button>
                    </div>
                </div>
                
                <div class="form-section-title">Personal Information</div>
                
                <div class="form-row">
                    <div class="input-group">
                        <input type="tel" id="mobile" name="mobile" placeholder=" ">
                        <label for="mobile">Mobile Number</label>
                        <i class="bi bi-phone"></i>
                    </div>
                    
                    <div class="input-group">
                        <select id="gender" name="gender" class="form-select">
                            <option value="">Select Gender</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                        <i class="bi bi-gender-neuter"></i>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="input-group">
                        <input type="number" id="age" name="age" min="1" max="150" placeholder=" ">
                        <label for="age">Age</label>
                        <i class="bi bi-calendar"></i>
                    </div>
                    
                    <div class="input-group">
                        <select id="maritalStatus" name="maritalStatus" class="form-select">
                            <option value="">Select Marital Status</option>
                            <option value="Single">Single</option>
                            <option value="Married">Married</option>
                            <option value="Divorced">Divorced</option>
                            <option value="Widowed">Widowed</option>
                            <option value="Separated">Separated</option>
                        </select>
                        <i class="bi bi-heart"></i>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="input-group">
                        <select id="region" name="region" class="form-select" onchange="updateCities()">
                            <option value="">Select Region</option>
                            <option value="Dhaka">Dhaka</option>
                            <option value="Chittagong">Chittagong</option>
                            <option value="Khulna">Khulna</option>
                            <option value="Barisal">Barisal</option>
                            <option value="Sylhet">Sylhet</option>
                            <option value="Rangpur">Rangpur</option>
                            <option value="Mymensingh">Mymensingh</option>
                        </select>
                        <i class="bi bi-map"></i>
                    </div>
                    
                    <div class="input-group">
                        <select id="city" name="city" class="form-select">
                            <option value="">Select City</option>
                        </select>
                        <i class="bi bi-building"></i>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="input-group">
                        <input type="text" id="postalCode" name="postalCode" placeholder=" ">
                        <label for="postalCode">Postal Code</label>
                        <i class="bi bi-mailbox"></i>
                    </div>
                    
                    <div class="input-group">
                        <select id="religion" name="religion" class="form-select">
                            <option value="">Select Religion</option>
                            <option value="Islam">Islam</option>
                            <option value="Hinduism">Hinduism</option>
                            <option value="Buddhism">Buddhism</option>
                            <option value="Christianity">Christianity</option>
                            <option value="Other">Other</option>
                        </select>
                        <i class="bi bi-star"></i>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="input-group full-width">
                        <textarea id="address" name="address" rows="2" placeholder=" "></textarea>
                        <label for="address">Address</label>
                        <i class="bi bi-geo-alt"></i>
                    </div>
                </div>
                
                <div th:if="${error}" class="error-message">
                    <i class="bi bi-exclamation-circle"></i> <span th:text="${error}"></span>
                </div>
                
                <button type="submit" class="btn btn-primary btn-lg w-100">
                    <i class="bi bi-person-plus"></i> Create Account
                </button>
            </form>
            
            <div class="auth-footer">
                <p>Already have an account? <a href="/login">Sign in</a></p>
            </div>
            
            <div class="approval-notice">
                <i class="bi bi-shield-check"></i>
                <div>
                    <strong>Approval Required</strong>
                    <p>Your account needs admin approval before you can login.</p>
                </div>
            </div>
        </div>
    </div>

    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 50%, #f8fafc 100%);
        }

        .auth-shapes {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .auth-shapes .shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
        }

        .shape-1 {
            width: 500px;
            height: 500px;
            background: var(--secondary);
            top: -200px;
            right: -200px;
        }

        .shape-2 {
            width: 400px;
            height: 400px;
            background: var(--primary);
            bottom: -150px;
            left: -150px;
        }

        .shape-3 {
            width: 300px;
            height: 300px;
            background: var(--accent);
            top: 40%;
            right: 20%;
        }

        .auth-logo {
            position: absolute;
            top: 2rem;
            left: 2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            z-index: 10;
        }

        .auth-logo i {
            font-size: 1.75rem;
        }

        .auth-card {
            width: 100%;
            max-width: 440px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: var(--radius-xl);
            padding: 2rem;
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.15),
                0 0 0 1px rgba(255, 255, 255, 0.5) inset;
            position: relative;
            z-index: 5;
            animation: fadeIn 0.6s ease-out;
        }

        .auth-card-wide {
            max-width: 700px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .auth-header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 0.5rem;
        }

        .auth-header p {
            color: var(--text-light);
            font-size: 0.9375rem;
        }

        .form-section-title {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 1rem;
            margin-top: 0.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--gray-200);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .form-row .full-width {
            grid-column: 1 / -1;
        }

        .auth-form .input-group {
            position: relative;
        }

        .auth-form .input-group input,
        .auth-form .input-group textarea,
        .auth-form .input-group select {
            width: 100%;
            padding: 1rem 1rem 1rem 2.75rem;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid var(--gray-200);
            border-radius: var(--radius);
            font-size: 0.9375rem;
            color: var(--text);
            transition: var(--transition);
        }

        .auth-form .input-group input:focus,
        .auth-form .input-group textarea:focus,
        .auth-form .input-group select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
            background: var(--white);
        }

        .auth-form .input-group label {
            position: absolute;
            left: 2.75rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.9375rem;
            color: var(--text-light);
            pointer-events: none;
            transition: var(--transition);
            background: transparent;
            padding: 0 0.25rem;
        }

        .auth-form .input-group input:focus + label,
        .auth-form .input-group input:not(:placeholder-shown) + label,
        .auth-form .input-group textarea:focus + label,
        .auth-form .input-group textarea:not(:placeholder-shown) + label {
            top: 0;
            font-size: 0.75rem;
            color: var(--primary);
            background: var(--white);
        }

        .auth-form .input-group i:not(.password-toggle i) {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
            font-size: 1.125rem;
            transition: var(--transition);
            z-index: 1;
        }

        .auth-form .input-group select + i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
            font-size: 1.125rem;
            pointer-events: none;
            z-index: 1;
        }

        .auth-form .input-group input:focus ~ i:not(.password-toggle i),
        .auth-form .input-group textarea:focus ~ i,
        .auth-form .input-group select:focus + i {
            color: var(--primary);
        }

        .form-select {
            appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.75rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
            padding-right: 2.5rem;
        }

        .input-group-password {
            position: relative;
        }

        .input-group-password input {
            padding-right: 3rem !important;
        }

        .password-toggle {
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-light);
            padding: 0.25rem;
            font-size: 1.125rem;
            transition: color 0.3s;
            z-index: 10;
        }

        .password-toggle:hover {
            color: var(--primary);
        }

        .auth-form .btn {
            margin-top: 1.5rem;
        }

        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-light);
        }

        .auth-footer a {
            color: var(--primary);
            font-weight: 500;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .approval-notice {
            margin-top: 1.5rem;
            padding: 1rem;
            background: rgba(6, 182, 212, 0.1);
            border: 1px solid rgba(6, 182, 212, 0.2);
            border-radius: var(--radius);
            display: flex;
            gap: 0.75rem;
            align-items: flex-start;
        }

        .approval-notice i {
            color: var(--accent);
            font-size: 1.25rem;
            margin-top: 0.125rem;
        }

        .approval-notice strong {
            color: var(--dark);
            font-size: 0.875rem;
            display: block;
            margin-bottom: 0.25rem;
        }

        .approval-notice p {
            color: var(--text-light);
            font-size: 0.8125rem;
            margin: 0;
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 1.5rem;
                max-width: 100%;
            }
            
            .auth-logo {
                top: 1rem;
                left: 1rem;
            }
            
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .form-row .full-width {
                grid-column: 1;
            }
        }

        .error-message {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1rem;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: var(--radius);
            color: var(--danger);
            font-size: 0.875rem;
            margin-bottom: 1rem;
        }
    </style>

    <script>
        var cityData = {
            'Dhaka': ['Dhaka', 'Gazipur', 'Narayanganj', 'Tangail', 'Manikganj', 'Munshiganj', 'Narsingdi', 'Faridpur', 'Gopalganj', 'Madaripur', 'Shariatpur', 'Rajbari', 'Kishoreganj', 'Netrakona', 'Mymensingh', 'Jamalpur', 'Sherpur'],
            'Chittagong': ['Chittagong', 'Cox\'s Bazar', 'Bandarban', 'Rangamati', 'Khagrachari', 'Feni', 'Noakhali', 'Lakshmipur', 'Chandpur', 'Comilla', 'Brahmanbaria'],
            'Khulna': ['Khulna', 'Jessore', 'Jhenaidah', 'Magura', 'Narail', 'Bagerhat', 'Satkhira', 'Pirojpur'],
            'Barisal': ['Barisal', 'Bhola', 'Patuakhali', 'Barguna', 'Jhalokathi'],
            'Sylhet': ['Sylhet', 'Moulvibazar', 'Habiganj', 'Sunamganj'],
            'Rangpur': ['Rangpur', 'Dinajpur', 'Thakurgaon', 'Panchagarh', 'Nilphamari', 'Lalmonirhat', 'Gaibandha', 'Kurigram'],
            'Mymensingh': ['Mymensingh', 'Jamalpur', 'Netrakona', 'Sherpur']
        };

        function updateCities() {
            var regionSelect = document.getElementById('region');
            var citySelect = document.getElementById('city');
            var selectedRegion = regionSelect.value;
            
            citySelect.innerHTML = '<option value="">Select City</option>';
            
            if (selectedRegion && cityData[selectedRegion]) {
                cityData[selectedRegion].forEach(function(city) {
                    var option = document.createElement('option');
                    option.value = city;
                    option.textContent = city;
                    citySelect.appendChild(option);
                });
            }
        }

        function togglePassword(inputId) {
            var input = document.getElementById(inputId);
            var iconId = inputId === 'password' ? 'passwordIcon' : 'confirmPasswordIcon';
            var icon = document.getElementById(iconId);
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('bi-eye');
                icon.classList.add('bi-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('bi-eye-slash');
                icon.classList.add('bi-eye');
            }
        }

        document.getElementById('registerForm').addEventListener('submit', function(e) {
            var password = document.getElementById('password').value;
            var confirmPassword = document.getElementById('confirmPassword').value;
            
            if (password !== confirmPassword) {
                e.preventDefault();
                alert('Passwords do not match!');
                return false;
            }
            
            if (password.length < 6) {
                e.preventDefault();
                alert('Password must be at least 6 characters!');
                return false;
            }
        });
    </script>
</body>
</html>
