<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - PollFlow Admin</title>
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body>
    <nav class="admin-navbar">
        <div class="container">
            <a class="admin-brand" href="/admin">
                <i class="bi bi-lightning-charge-fill"></i>
                <span>PollFlow <small>Admin</small></span>
            </a>
            <div class="admin-nav-links">
                <a href="/admin" class="nav-link">
                    <i class="bi bi-gear"></i> Dashboard
                </a>
                <a href="/admin/poll/create" class="nav-link">
                    <i class="bi bi-plus-circle"></i> Create Poll
                </a>
                <a href="/admin/analytics" class="nav-link">
                    <i class="bi bi-graph-up"></i> Analytics
                </a>
                <a href="/admin/users" class="nav-link">
                    <i class="bi bi-people"></i> Users
                </a>
            </div>
            <div class="admin-actions">
                <div class="nav-item-wrapper">
                    <button class="profile-btn" onclick="toggleProfileDropdown()">
                        <i class="bi bi-person-circle"></i>
                        <span th:text="${currentUser.fullName}">Admin</span>
                        <i class="bi bi-chevron-down"></i>
                    </button>
                    <div id="profileDropdown" class="profile-dropdown">
                        <div class="profile-dropdown-header">
                            <i class="bi bi-person-circle" style="font-size: 1.5rem; color: #3b82f6;"></i>
                            <div>
                                <div class="profile-name" th:text="${currentUser.fullName}">Admin</div>
                                <div class="profile-email" th:text="${currentUser.email}">admin@example.com</div>
                            </div>
                        </div>
                        <a href="/admin/profile" class="profile-dropdown-item active">
                            <i class="bi bi-person"></i> See Profile
                        </a>
                        <div class="profile-dropdown-divider"></div>
                        <a href="/logout" class="profile-dropdown-item logout">
                            <i class="bi bi-box-arrow-right"></i> Logout
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="admin-container">
        <div class="admin-header">
            <div class="header-content">
                <h1>
                    <i class="bi bi-person"></i> Admin Profile
                </h1>
                <p>Manage your account information</p>
            </div>
            <div class="header-badge badge-primary">
                <span th:text="${currentUser.role == 'POLL_ADMIN'} ? 'Poll Admin' : 'Verification Admin'">Admin</span>
            </div>
        </div>

        <div class="profile-card">
            <div class="profile-header">
                <div class="profile-avatar">
                    <span th:text="${#strings.substring(user.fullName, 0, 1)}">A</span>
                </div>
                <div class="profile-info">
                    <h2 th:text="${user.fullName}">Admin Name</h2>
                    <p th:text="${user.email}">admin@example.com</p>
                    <span class="role-badge" th:text="${currentUser.role == 'POLL_ADMIN'} ? 'Poll Admin' : 'Verification Admin'">Admin</span>
                </div>
            </div>

            <div class="profile-details">
                <div class="detail-item">
                    <label>Full Name</label>
                    <span th:text="${user.fullName}">-</span>
                </div>
                <div class="detail-item">
                    <label>Email</label>
                    <span th:text="${user.email}">-</span>
                </div>
                <div class="detail-item">
                    <label>Role</label>
                    <span th:text="${currentUser.role == 'POLL_ADMIN'} ? 'Poll Admin' : 'Verification Admin'">-</span>
                </div>
                <div class="detail-item">
                    <label>Status</label>
                    <span class="status-active" th:text="${user.status}">Active</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleProfileDropdown() {
            document.getElementById('profileDropdown').classList.toggle('show');
        }

        document.addEventListener('click', function(e) {
            var profileDropdown = document.getElementById('profileDropdown');
            var profileBtn = document.querySelector('.profile-btn');
            if (profileBtn && !profileBtn.contains(e.target)) {
                profileDropdown.classList.remove('show');
            }
        });
    </script>

    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --dark: #0f172a;
            --text: #334155;
            --text-light: #64748b;
            --gray-50: #f8fafc;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --radius: 8px;
            --radius-lg: 12px;
            --radius-xl: 16px;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--gray-50); color: var(--text); }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 1.5rem; }

        .admin-navbar { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: var(--white); border-bottom: 1px solid var(--gray-200); padding: 0.75rem 0; }
        .admin-navbar .container { display: flex; align-items: center; justify-content: space-between; }
        .admin-brand { display: flex; align-items: center; gap: 0.5rem; font-size: 1.25rem; font-weight: 700; color: var(--primary); text-decoration: none; }
        .admin-brand small { font-size: 0.75rem; font-weight: 400; color: var(--text-light); }

        .admin-container { padding: 6rem 2rem 3rem; max-width: 900px; margin: 0 auto; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .header-content h1 { font-size: 1.75rem; font-weight: 700; color: var(--dark); display: flex; align-items: center; gap: 0.75rem; }
        .header-content p { color: var(--text-light); margin-top: 0.25rem; }
        .header-badge { padding: 0.5rem 1rem; border-radius: 9999px; font-size: 0.875rem; font-weight: 500; }
        .badge-primary { background: rgba(99, 102, 241, 0.1); color: var(--primary); }

        .profile-card { background: var(--white); border-radius: var(--radius-xl); padding: 2rem; box-shadow: var(--shadow); }
        .profile-header { display: flex; align-items: center; gap: 1.5rem; margin-bottom: 2rem; padding-bottom: 2rem; border-bottom: 1px solid var(--gray-200); }
        .profile-avatar { width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; background: var(--primary); border-radius: 50%; font-size: 2rem; font-weight: 700; color: var(--white); }
        .profile-info h2 { font-size: 1.5rem; font-weight: 600; color: var(--dark); }
        .profile-info p { color: var(--text-light); margin: 0.25rem 0 0.5rem; }
        .role-badge { display: inline-block; padding: 0.25rem 0.75rem; background: rgba(99, 102, 241, 0.1); color: var(--primary); border-radius: 9999px; font-size: 0.75rem; font-weight: 500; }

        .profile-details { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; }
        .detail-item { display: flex; flex-direction: column; gap: 0.25rem; }
        .detail-item label { font-size: 0.75rem; font-weight: 600; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.5px; }
        .detail-item span { font-size: 1rem; color: var(--text); }
        .status-active { color: var(--success); font-weight: 500; }

        .admin-actions { display: flex; align-items: center; gap: 1rem; }
        .nav-item-wrapper { position: relative; display: inline-block; }
        .profile-btn { display: flex; align-items: center; gap: 0.5rem; background: var(--gray-100); border: none; padding: 0.5rem 1rem; border-radius: var(--radius-lg); cursor: pointer; font-size: 0.9375rem; color: var(--text); }
        .profile-btn:hover { background: var(--gray-200); }
        .profile-btn i:first-child { font-size: 1.25rem; }
        .profile-btn i:last-child { font-size: 0.75rem; }
        .profile-dropdown { display: none; position: absolute; right: 0; top: 100%; margin-top: 0.5rem; background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius-lg); width: 220px; box-shadow: var(--shadow-lg); z-index: 100; }
        .profile-dropdown.show { display: block; }
        .profile-dropdown-header { display: flex; align-items: center; gap: 0.75rem; padding: 1rem; border-bottom: 1px solid var(--gray-100); }
        .profile-dropdown-header .profile-name { font-weight: 600; font-size: 0.875rem; }
        .profile-dropdown-header .profile-email { font-size: 0.75rem; color: var(--text-light); }
        .profile-dropdown-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem; color: var(--text); text-decoration: none; font-size: 0.875rem; }
        .profile-dropdown-item:hover { background: var(--gray-50); }
        .profile-dropdown-item.active { background: rgba(99, 102, 241, 0.1); color: var(--primary); }
        .profile-dropdown-item.logout { color: var(--danger); }
        .profile-dropdown-divider { height: 1px; background: var(--gray-100); margin: 0.25rem 0; }

        .admin-nav-links { display: flex; gap: 0.5rem; }
        .nav-link { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; color: var(--text-light); text-decoration: none; font-size: 0.9375rem; border-radius: var(--radius); transition: all 0.3s; }
        .nav-link:hover { background: var(--gray-100); color: var(--text); }
        .nav-link.active { background: var(--primary); color: var(--white); }

        @media (max-width: 768px) { 
            .profile-details { grid-template-columns: 1fr; }
            .admin-header { flex-direction: column; align-items: flex-start; gap: 1rem; }
            .profile-header { flex-direction: column; text-align: center; }
        }
    </style>
</body>
</html>
